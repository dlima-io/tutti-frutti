<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tutti Frutti</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f5f4f0; min-height: 100vh; color: #1a1a1a; }
  .page { padding: 1.5rem; max-width: 580px; margin: 0 auto; }
  h1 { font-size: 24px; font-weight: 600; margin-bottom: 4px; }
  .sub { font-size: 14px; color: #666; margin-bottom: 1.5rem; }
  .card { background: white; border: 1px solid #e5e5e5; border-radius: 14px; padding: 1.25rem; margin-bottom: 1rem; }
  .field { margin-bottom: 1rem; }
  .field:last-child { margin-bottom: 0; }
  .field label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; }
  .field input { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 10px 12px; font-size: 16px; font-family: inherit; background: #fafafa; outline: none; transition: border-color 0.15s; }
  .field input:focus { border-color: #888; background: white; }
  .divider { text-align: center; font-size: 13px; color: #aaa; margin: 12px 0; }
  .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-size: 15px; font-family: inherit; font-weight: 500; cursor: pointer; transition: all 0.15s; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-dark { background: #1a1a1a; color: white; }
  .btn-dark:hover:not(:disabled) { background: #333; }
  .btn-outline { background: white; color: #1a1a1a; border: 1px solid #ddd; margin-top: 8px; }
  .btn-outline:hover:not(:disabled) { background: #f5f5f5; }
  .btn-stop { background: #ef4444; color: white; font-size: 20px; font-weight: 700; padding: 18px; letter-spacing: 2px; border-radius: 14px; width: 100%; border: none; cursor: pointer; transition: all 0.15s; }
  .btn-stop:active { transform: scale(0.97); }
  .btn-stop:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
  .status-bar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: white; border: 1px solid #e5e5e5; border-radius: 10px; margin-bottom: 12px; font-size: 13px; color: #555; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
  .dot.verde { background: #22c55e; }
  .dot.amarillo { background: #f59e0b; }
  .dot.rojo { background: #ef4444; }
  .players-wrap { margin-bottom: 12px; }
  .players-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { padding: 6px 12px; border-radius: 8px; border: 1px solid #e5e5e5; font-size: 13px; background: #fafafa; color: #888; white-space: nowrap; }
  .chip.yo { border-color: #1a1a1a; color: #1a1a1a; background: white; font-weight: 500; }
  .chip.listo { border-color: #22c55e; color: #15803d; background: #f0fdf4; }
  .chip.entregado { border-color: #3b82f6; color: #1d4ed8; background: #eff6ff; }
  .letra-grande { font-size: 80px; font-weight: 700; text-align: center; line-height: 1; padding: 1rem 0 0.5rem; color: #1a1a1a; }
  .letra-hint { text-align: center; font-size: 13px; color: #888; padding-bottom: 0.75rem; }
  .categorias { display: flex; flex-direction: column; gap: 8px; }
  .cat-row { display: flex; align-items: center; gap: 10px; }
  .cat-label { font-size: 13px; color: #666; width: 130px; flex-shrink: 0; }
  .cat-input { flex: 1; border: 1px solid #ddd; border-radius: 8px; padding: 9px 11px; font-size: 15px; font-family: inherit; background: #fafafa; outline: none; transition: border-color 0.15s; }
  .cat-input:focus { border-color: #888; background: white; }
  .cat-input:disabled { opacity: 0.55; cursor: not-allowed; }
  .cat-input.ok { border-color: #22c55e; background: #f0fdf4; }
  .cat-input.repetida { border-color: #f59e0b; background: #fffbeb; }
  .stop-banner { background: #ef4444; color: white; text-align: center; padding: 12px; border-radius: 10px; font-weight: 600; font-size: 16px; margin-bottom: 12px; display: none; }
  .info-box { background: #fffbeb; border: 1px solid #fde68a; border-radius: 10px; padding: 12px 14px; font-size: 13px; color: #92400e; margin-bottom: 1rem; line-height: 1.6; }
  .sala-grande { font-size: 26px; font-weight: 700; letter-spacing: 5px; }
  .esperando-resp { font-size: 13px; color: #888; text-align: center; padding: 12px 0; }
  #setup, #game { display: none; }

  /* Tabla resultados */
  .resultados-wrap { overflow-x: auto; }
  .resultados-tabla { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 320px; }
  .resultados-tabla th { text-align: left; padding: 6px 8px; color: #666; font-weight: 500; border-bottom: 2px solid #f0f0f0; white-space: nowrap; }
  .resultados-tabla td { padding: 7px 8px; border-bottom: 1px solid #f5f5f5; vertical-align: middle; }
  .resultados-tabla td.cat { color: #666; font-size: 12px; white-space: nowrap; }
  .resultados-tabla tr:last-child td { border-bottom: none; }
  .badge { display: inline-block; font-size: 11px; padding: 2px 7px; border-radius: 20px; font-weight: 500; white-space: nowrap; }
  .badge-ok { background: #f0fdf4; color: #15803d; }
  .badge-vacia { background: #f5f5f5; color: #aaa; }
  .badge-repetida { background: #fffbeb; color: #92400e; }
  .fila-total { background: #fafafa; }
  .fila-total td { font-weight: 600; padding-top: 10px; border-top: 2px solid #e5e5e5; border-bottom: none; }
  .fila-acum td { color: #666; font-size: 12px; padding-bottom: 4px; border-bottom: none; }
</style>
</head>
<body>

<div class="page" id="setup">
  <h1>🍓 Tutti Frutti</h1>
  <p class="sub">Multijugador en tiempo real — hasta 6 jugadores</p>
  <div class="card">
    <div class="field">
      <label>Tu nombre</label>
      <input id="inp-nombre" placeholder="Ej: Sofi" maxlength="20" />
    </div>
    <button class="btn btn-dark" onclick="crearSala()">Crear sala nueva</button>
    <div class="divider">— o —</div>
    <div class="field">
      <label>Código de sala</label>
      <input id="inp-sala" placeholder="Ej: ABC123" maxlength="6"
        style="text-transform:uppercase;letter-spacing:4px;"
        oninput="this.value=this.value.toUpperCase()" />
    </div>
    <button class="btn btn-outline" onclick="unirse()">Unirse a sala</button>
  </div>
</div>

<div class="page" id="game">
  <div class="status-bar">
    <div class="dot amarillo" id="dot"></div>
    <span id="estado-conn">Conectando...</span>
  </div>

  <div id="info-sala" class="info-box" style="display:none;"></div>

  <div class="players-wrap">
    <div class="players-grid" id="players-grid"></div>
  </div>

  <div id="stop-banner" class="stop-banner"></div>

  <div class="card">
    <div class="letra-grande" id="letra">?</div>
    <div class="letra-hint" id="letra-hint">Esperando que empiece la ronda</div>
  </div>

  <div class="card">
    <div class="categorias" id="categorias"></div>
  </div>

  <button class="btn btn-stop" id="btn-stop" onclick="cantarStop()" disabled>¡ S T O P !</button>
  <button class="btn btn-outline" id="btn-nueva" onclick="nuevaRonda()" style="display:none;margin-top:10px;">▶ Nueva ronda</button>

  <div class="card" id="card-resultados" style="display:none;margin-top:1rem;">
    <div style="font-size:15px;font-weight:600;margin-bottom:12px;">Resultados de la ronda</div>
    <div id="esperando-otros" class="esperando-resp" style="display:none;"></div>
    <div class="resultados-wrap">
      <div id="tabla-resultados"></div>
    </div>
  </div>
</div>

<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<script>
const ABLY_KEY = "bJht8w.8EuVXg:UgP79w2cCdSsiHUhFLAwVWYg14oMlRXMekWRIKQqSbs";
const CATEGORIAS = ["Nombre","Apellido","Ciudad","Animal","Fruta o verdura","Color","Marca","País","Película","Cosa u objeto"];
const LETRAS = "ABCDEFGHIJLMNOPRSTUVZ".split("");
const MAX_JUGADORES = 6;

let sala = "";
let miNombre = "";
let soyCreador = false;
let juegoActivo = false;
let bloqueado = false;
let canal = null;

// jugadores: { nombre: { nombre, listo, entregado } }
let jugadores = {};
// respuestas recibidas esta ronda: { nombre: [resp0..resp9] }
let respuestasRonda = {};
// puntajes acumulados: { nombre: pts }
let puntajesAcum = {};

function genCodigo() {
  return Math.random().toString(36).substring(2, 8).toUpperCase();
}

function normalizar(str) {
  return (str || "")
    .toLowerCase()
    .trim()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9\s]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

window.onload = () => {
  document.getElementById("setup").style.display = "block";
  document.getElementById("inp-nombre").focus();
};

function crearSala() {
  const nombre = document.getElementById("inp-nombre").value.trim();
  if (!nombre) { alert("Poné tu nombre primero"); return; }
  miNombre = nombre;
  soyCreador = true;
  sala = genCodigo();
  arrancar();
}

function unirse() {
  const nombre = document.getElementById("inp-nombre").value.trim();
  const cod = document.getElementById("inp-sala").value.trim().toUpperCase();
  if (!nombre) { alert("Poné tu nombre primero"); return; }
  if (cod.length < 4) { alert("Ingresá el código de sala"); return; }
  miNombre = nombre;
  soyCreador = false;
  sala = cod;
  arrancar();
}

function arrancar() {
  jugadores[miNombre] = { nombre: miNombre, listo: true, entregado: false };
  puntajesAcum[miNombre] = 0;
  document.getElementById("setup").style.display = "none";
  document.getElementById("game").style.display = "block";
  renderJugadores();
  renderCategorias();
  conectarAbly();
}

function conectarAbly() {
  setConn("amarillo", "Conectando...");
  try {
    const ably = new Ably.Realtime({ key: ABLY_KEY });
    canal = ably.channels.get("tutti-" + sala);
    ably.connection.on("connected", () => {
      setConn("verde", "Conectado");
      canal.subscribe(procesarMensaje);
      enviar("hola", { nombre: miNombre });
      if (soyCreador) {
        const box = document.getElementById("info-sala");
        box.style.display = "block";
        box.innerHTML = `Compartí este código para que se unan:<br><span class="sala-grande">${sala}</span><br><span style="font-size:12px;color:#b45309;">Pueden unirse hasta ${MAX_JUGADORES} jugadores antes de empezar.</span>`;
        mostrarBtnNueva();
      }
    });
    ably.connection.on("disconnected", () => setConn("amarillo", "Reconectando..."));
    ably.connection.on("failed", () => setConn("rojo", "Error de conexión"));
  } catch(e) {
    setConn("rojo", "Error al conectar");
  }
}

function enviar(tipo, datos = {}) {
  if (!canal) return;
  canal.publish(tipo, { from: miNombre, ...datos });
}

function procesarMensaje(msg) {
  const tipo = msg.name;
  const data = msg.data;
  if (data.from === miNombre) return;

  if (tipo === "hola" || tipo === "hola-back") {
    const nombre = data.nombre || data.from;
    if (!jugadores[nombre]) {
      jugadores[nombre] = { nombre, listo: true, entregado: false };
      puntajesAcum[nombre] = 0;
    }
    renderJugadores();
    if (tipo === "hola") enviar("hola-back", { nombre: miNombre });
  }

  if (tipo === "nueva-ronda") {
    empezarRonda(data.letra);
  }

  if (tipo === "stop") {
    if (!bloqueado) {
      bloqueado = true;
      juegoActivo = false;
      bloquearInputs();
      const misResp = leerMisRespuestas();
      respuestasRonda[miNombre] = misResp;
      jugadores[miNombre].entregado = true;
      enviar("respuestas", { respuestas: misResp });
      mostrarStopBanner("🛑 " + data.from + " cantó STOP");
      renderJugadores();
      verificarResultados();
    }
  }

  if (tipo === "respuestas") {
    respuestasRonda[data.from] = data.respuestas;
    if (jugadores[data.from]) jugadores[data.from].entregado = true;
    renderJugadores();
    verificarResultados();
  }
}

function nuevaRonda() {
  const cantJ = Object.keys(jugadores).length;
  if (cantJ < 2) { alert("Esperá que se una al menos otra persona"); return; }
  const letra = LETRAS[Math.floor(Math.random() * LETRAS.length)];
  enviar("nueva-ronda", { letra });
  empezarRonda(letra);
}

function empezarRonda(letra) {
  juegoActivo = true;
  bloqueado = false;
  respuestasRonda = {};
  Object.keys(jugadores).forEach(n => jugadores[n].entregado = false);

  document.getElementById("letra").textContent = letra;
  document.getElementById("letra-hint").textContent = "Escribí tus respuestas con " + letra;
  document.getElementById("btn-stop").disabled = false;
  document.getElementById("btn-nueva").style.display = "none";
  document.getElementById("card-resultados").style.display = "none";
  document.getElementById("stop-banner").style.display = "none";
  document.getElementById("info-sala").style.display = "none";

  document.querySelectorAll(".cat-input").forEach(inp => {
    inp.value = "";
    inp.disabled = false;
    inp.className = "cat-input";
    inp.placeholder = "Con " + letra + "...";
  });
  renderJugadores();
  document.querySelector(".cat-input")?.focus();
}

function cantarStop() {
  if (!juegoActivo || bloqueado) return;
  bloqueado = true;
  juegoActivo = false;
  bloquearInputs();
  const misResp = leerMisRespuestas();
  respuestasRonda[miNombre] = misResp;
  jugadores[miNombre].entregado = true;
  enviar("stop");
  enviar("respuestas", { respuestas: misResp });
  mostrarStopBanner("🛑 ¡Cantaste STOP!");
  renderJugadores();
  verificarResultados();
}

function bloquearInputs() {
  document.getElementById("btn-stop").disabled = true;
  document.querySelectorAll(".cat-input").forEach(inp => inp.disabled = true);
}

function leerMisRespuestas() {
  return CATEGORIAS.map((_, i) => {
    const inp = document.getElementById("cat-" + i);
    return inp ? inp.value.trim() : "";
  });
}

function mostrarStopBanner(msg) {
  const b = document.getElementById("stop-banner");
  b.textContent = msg;
  b.style.display = "block";
}

function verificarResultados() {
  const totalJugadores = Object.keys(jugadores).length;
  const entregados = Object.keys(respuestasRonda).length;

  document.getElementById("card-resultados").style.display = "block";

  if (entregados < totalJugadores) {
    const faltaN = totalJugadores - entregados;
    document.getElementById("esperando-otros").style.display = "block";
    document.getElementById("esperando-otros").textContent =
      `Esperando respuestas de ${faltaN} jugador${faltaN > 1 ? "es" : ""}...`;
    return;
  }

  document.getElementById("esperando-otros").style.display = "none";
  renderResultadosCompletos();
}

function renderResultadosCompletos() {
  const nombres = Object.keys(jugadores);

  // Para cada categoría y jugador, detectar repetidas
  // Una respuesta es "repetida" si otro jugador puso lo mismo (normalizado)
  const esRepetida = CATEGORIAS.map((_, i) => {
    const vals = nombres.map(n => normalizar((respuestasRonda[n] || [])[i]));
    return nombres.map((_, j) => {
      if (!vals[j]) return false;
      return vals.filter(v => v === vals[j]).length > 1;
    });
  });

  // Calcular puntos de esta ronda por jugador
  const ptsRonda = {};
  nombres.forEach((n, j) => {
    let pts = 0;
    CATEGORIAS.forEach((_, i) => {
      const r = ((respuestasRonda[n] || [])[i] || "").trim();
      if (r && !esRepetida[i][j]) pts++;
    });
    ptsRonda[n] = pts;
    puntajesAcum[n] = (puntajesAcum[n] || 0) + pts;
  });

  // Colorear inputs propios
  CATEGORIAS.forEach((_, i) => {
    const inp = document.getElementById("cat-" + i);
    if (!inp) return;
    const miIdx = nombres.indexOf(miNombre);
    const r = ((respuestasRonda[miNombre] || [])[i] || "").trim();
    if (!r) return;
    inp.className = "cat-input " + (esRepetida[i][miIdx] ? "repetida" : "ok");
  });

  // Construir tabla
  let cols = `<th style="width:110px">Categoría</th>`;
  nombres.forEach(n => {
    cols += `<th>${n}${n === miNombre ? " (vos)" : ""}</th>`;
  });

  let filas = "";
  CATEGORIAS.forEach((cat, i) => {
    let fila = `<td class="cat">${cat}</td>`;
    nombres.forEach((n, j) => {
      const r = ((respuestasRonda[n] || [])[i] || "").trim();
      const rep = esRepetida[i][j];
      if (r) {
        fila += `<td><span class="badge ${rep ? "badge-repetida" : "badge-ok"}">${r}${rep ? " ★" : ""}</span></td>`;
      } else {
        fila += `<td><span class="badge badge-vacia">—</span></td>`;
      }
    });
    filas += `<tr>${fila}</tr>`;
  });

  // Fila de puntos de la ronda
  let filaPts = `<td class="cat">Esta ronda</td>`;
  nombres.forEach(n => { filaPts += `<td><strong>${ptsRonda[n]} pts</strong></td>`; });

  // Fila acumulado
  let filaAcum = `<td class="cat">Total</td>`;
  nombres.forEach(n => { filaAcum += `<td>${puntajesAcum[n]} pts</td>`; });

  document.getElementById("tabla-resultados").innerHTML = `
    <table class="resultados-tabla">
      <thead><tr>${cols}</tr></thead>
      <tbody>
        ${filas}
        <tr class="fila-total">${filaPts}</tr>
        <tr class="fila-acum">${filaAcum}</tr>
      </tbody>
    </table>
    <div style="font-size:12px;color:#aaa;margin-top:10px;">★ Respuesta repetida — no suma puntos</div>
  `;

  if (soyCreador) mostrarBtnNueva();
  else {
    document.getElementById("letra-hint").textContent = "Esperá que el creador de la sala inicie la siguiente ronda";
  }
}

function renderJugadores() {
  const grid = document.getElementById("players-grid");
  grid.innerHTML = Object.values(jugadores).map(j => {
    let cls = "chip";
    if (j.nombre === miNombre) cls += " yo";
    else if (j.entregado) cls += " entregado";
    else if (j.listo) cls += " listo";
    const icono = j.entregado ? " ✓" : "";
    return `<div class="${cls}">${j.nombre}${j.nombre === miNombre ? " (vos)" : ""}${icono}</div>`;
  }).join("");
}

function renderCategorias() {
  document.getElementById("categorias").innerHTML = CATEGORIAS.map((cat, i) =>
    `<div class="cat-row">
      <span class="cat-label">${cat}</span>
      <input class="cat-input" id="cat-${i}" disabled placeholder="..." />
    </div>`
  ).join("");
}

function setConn(color, txt) {
  document.getElementById("dot").className = "dot " + color;
  document.getElementById("estado-conn").textContent = txt;
}

function mostrarBtnNueva() {
  setTimeout(() => {
    document.getElementById("btn-nueva").style.display = "block";
  }, 500);
}
</script>
</body>
</html>
